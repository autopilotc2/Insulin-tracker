<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Gluco Diary"/>
  <title>Gluco Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#111;--bg2:#1a1a1a;--border:rgba(255,255,255,0.09);
      --accent:#4ecda4;--accent2:#38a882;
      --text:#f0f0f0;--text2:#aaa;--text3:#606060;
      --pill-green:rgba(58,173,132,0.75);--pill-amber:rgba(200,150,50,0.75);--pill-red:rgba(220,80,80,0.75);
      --tag-bg:rgba(160,110,240,0.15);--tag-border:rgba(160,110,240,0.3);--tag-text:#c5a5ff;
      --star:#f5c518;--red:rgba(255,80,80,0.15);--red-b:rgba(255,80,80,0.3);--red-t:#ff9999;
      --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;overscroll-behavior:none}
    .header{background:linear-gradient(135deg,#0d0d0d,#1c1c1c);border-bottom:1px solid var(--border);padding:calc(16px + var(--safe-top)) 20px 16px;text-align:center;position:sticky;top:0;z-index:50}
    .header h1{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent)}
    .tabs{display:flex;background:#0a0a0a;border-bottom:1px solid var(--border);position:sticky;top:61px;z-index:40}
    .tab-btn{flex:1;padding:12px 4px;background:none;border:none;border-bottom:3px solid transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:color .2s,border-color .2s}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
    .content{max-width:500px;margin:0 auto;padding:20px 16px calc(30px + var(--safe-bot))}
    .tab-panel{display:none}.tab-panel.active{display:block}
    .form-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:16px;animation:slideIn .3s ease}
    .form-divider{border:none;border-top:1px solid var(--border);margin:18px 0}
    .section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:14px}
    .field-label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);margin-bottom:7px;font-weight:700}
    input[type=text],input[type=number],textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:14px;transition:border-color .2s;-webkit-appearance:none}
    input:focus,textarea:focus{border-color:rgba(255,255,255,.35)}
    input::placeholder,textarea::placeholder{color:var(--text3)}
    textarea{resize:none;line-height:1.5}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* ── MASKED TIMESTAMP ── */
    .ts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .ts-field{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:0;display:flex;align-items:center;overflow:visible;transition:border-color .2s;position:relative}
    .ts-field:focus-within{border-color:rgba(255,255,255,.35)}
    .ts-seg{background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;text-align:center;-webkit-appearance:none;padding:12px 0}
    .ts-sep{color:var(--text3);font-size:15px;flex-shrink:0;user-select:none;pointer-events:none}
    .ts-dd{width:30px}
    .ts-mon{width:38px;cursor:pointer;caret-color:transparent}
    .ts-yyyy{width:46px}
    .ts-hh{width:28px}
    .ts-mm{width:28px}
    .ts-ampm{width:34px;cursor:pointer;caret-color:transparent;font-weight:700;color:var(--accent)}

    /* ── PICKER POPUP ── */
    .picker-popup{position:fixed;z-index:300;background:#242424;border:1px solid rgba(255,255,255,.18);border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.7);display:none;flex-direction:column}
    .picker-popup.show{display:flex}
    .picker-list{overflow-y:scroll;-webkit-overflow-scrolling:touch;scroll-snap-type:y mandatory;overscroll-behavior:contain}
    .picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:16px;font-family:'DM Sans',sans-serif;color:var(--text2);scroll-snap-align:center;cursor:pointer;transition:color .1s}
    .picker-item.selected{color:var(--accent);font-weight:700;font-size:17px}
    .picker-overlay-lines{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:44px;border-top:1px solid rgba(78,205,164,.3);border-bottom:1px solid rgba(78,205,164,.3);pointer-events:none}

    /* ── EDIT FORM TIMESTAMP ── */
    .edit-ts-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .edit-ts-field{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:8px;display:flex;align-items:center;overflow:visible;transition:border-color .2s;position:relative}
    .edit-ts-field:focus-within{border-color:rgba(255,255,255,.35)}
    .edit-ts-seg{background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;text-align:center;-webkit-appearance:none;padding:10px 0}
    .edit-ts-sep{color:var(--text3);font-size:14px;flex-shrink:0;user-select:none;pointer-events:none}
    .edit-ts-dd{width:26px}
    .edit-ts-mon{width:34px;cursor:pointer;caret-color:transparent}
    .edit-ts-yyyy{width:42px}
    .edit-ts-hh{width:24px}
    .edit-ts-mm{width:24px}
    .edit-ts-ampm{width:30px;cursor:pointer;caret-color:transparent;font-weight:700;color:var(--accent)}

    /* ── GLUCOSE + EVENT ROW (Variant 1) ── */
    .gluco-event-row{display:grid;grid-template-columns:120px 1fr;gap:12px;margin-bottom:12px}
    .glucose-hero{background:rgba(255,255,255,.05);border:1px solid var(--accent);border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;justify-content:center;min-height:66px}
    .glucose-hero input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:30px;font-weight:700;width:100%;-webkit-appearance:none;padding:0;line-height:1}
    .glucose-hero input::placeholder{color:var(--text3);font-size:20px;font-weight:400}
    .glucose-unit{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-top:4px}
    .event-col{display:flex;flex-direction:column;justify-content:flex-start}
    .event-col .ac-wrap input{margin-bottom:8px}
    /* ── EVENT PILLS ── */
    .ctx-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
    .ctx-pill{padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;-webkit-appearance:none}
    .ctx-pill.active{background:rgba(78,205,164,.2);border-color:var(--accent);color:var(--accent);font-weight:700}

    /* ── AUTOCOMPLETE ── */
    .ac-wrap{position:relative}
    .ac-list{position:absolute;top:calc(100% - 14px);left:0;right:0;background:#2a2a2a;border:1px solid rgba(255,255,255,.15);border-top:none;border-radius:0 0 10px 10px;z-index:100;max-height:180px;overflow-y:auto;display:none}
    .ac-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(255,255,255,.06)}
    .ac-item:last-child{border-bottom:none}
    .ac-item:active{background:rgba(255,255,255,.07)}
    .ac-item-row{display:flex;align-items:center;justify-content:space-between}
    .ac-sub{font-size:11px;color:var(--text3)}

    /* ── HISTORY ── */
    .hist-panel{background:rgba(78,205,164,.05);border:1px solid rgba(78,205,164,.2);border-radius:10px;padding:12px 14px;margin-top:-8px;margin-bottom:14px;animation:expandIn .2s ease}
    .hist-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:10px}
    .hist-row{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
    .hist-row:last-child{border-bottom:none}
    .hist-row.starred{background:rgba(245,197,24,.06);border-radius:6px;padding:7px 6px;margin:0 -6px}
    .hist-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px}
    .hist-date{font-size:11px;color:var(--text3)}

    /* ── TAGS ── */
    .tag-preview{display:flex;flex-wrap:wrap;gap:6px;margin:-8px 0 12px}
    .tag-chip{background:var(--tag-bg);border:1px solid var(--tag-border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--tag-text)}

    /* ── SAVE ── */
    .save-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:2px;box-shadow:0 4px 20px rgba(78,205,164,.2);transition:transform .15s;-webkit-appearance:none}
    .save-btn:active{transform:scale(.98)}

    /* ── SEARCH ── */
    .search-wrap{position:relative;margin-bottom:6px}
    .search-input{width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:13px 42px 13px 18px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:0;-webkit-appearance:none}
    .search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
    .search-hint{font-size:12px;color:var(--text3);margin-bottom:16px;padding-left:4px}
    .search-hint span{color:var(--tag-text)}
    .section-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;font-weight:700}

    /* ── GROUP ── */
    .group-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;animation:slideIn .25s ease}
    .group-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05)}
    .group-hdr:active{background:rgba(255,255,255,.03)}
    .group-name{font-family:'DM Serif Display',serif;font-size:17px;color:#e8e8e8;text-transform:capitalize}
    .group-meta{font-size:12px;color:var(--text3);margin-top:3px}
    .group-chevron{color:var(--text3);font-size:13px;transition:transform .2s;flex-shrink:0;margin-left:8px}
    .group-chevron.open{transform:rotate(180deg)}
    .group-entries{display:none}.group-entries.open{display:block}

    /* ── ENTRY CARDS ── */
    .food-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px 16px;margin-bottom:10px;animation:slideIn .25s ease;transition:border-color .2s,background .2s}
    .food-card.starred-card{border-color:rgba(245,197,24,.35);background:rgba(245,197,24,.03)}
    .food-card.editing{background:rgba(78,205,164,.04);border-color:rgba(78,205,164,.3)}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .card-info{flex:1;min-width:0}
    .food-name{font-family:'DM Serif Display',serif;font-size:17px;color:#e8e8e8;margin-bottom:7px;text-transform:capitalize;word-break:break-word}
    .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
    .pill{border-radius:20px;padding:3px 11px;font-size:12px;font-weight:700;color:#fff}
    .pill-amber{background:var(--pill-amber)}
    .pill-green{background:var(--pill-green);font-size:14.4px!important}
    .pill-red{background:var(--pill-red)}
    .pill-blue{background:rgba(80,140,220,0.75)}
    .pill-star{background:rgba(245,197,24,.2);border:1px solid rgba(245,197,24,.4);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--star);font-weight:700}
    .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
    .card-tag{background:var(--tag-bg);border:1px solid var(--tag-border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--tag-text)}
    .card-tag.matched{background:rgba(160,110,240,.3);border-color:var(--tag-text)}
    .card-remarks{font-size:13px;color:var(--text2);margin-top:7px;line-height:1.5;font-style:italic}
    .card-meta{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
    .card-time{font-size:11px;color:var(--text3)}
    .match-note{font-size:11px;color:var(--tag-text)}
    .card-actions{display:flex;gap:6px;flex-shrink:0}
    .btn-star{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.25);border-radius:8px;color:var(--star);padding:7px 10px;cursor:pointer;font-size:14px}
    .btn-star.on{background:rgba(245,197,24,.25);border-color:rgba(245,197,24,.6)}
    .btn-edit{background:rgba(78,205,164,.1);border:1px solid rgba(78,205,164,.25);border-radius:8px;color:var(--accent);padding:7px 10px;cursor:pointer;font-size:14px}
    .btn-del{background:var(--red);border:1px solid var(--red-b);border-radius:8px;color:var(--red-t);padding:7px 10px;cursor:pointer;font-size:14px}

    /* ── EDIT FORM ── */
    .edit-form{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);animation:expandIn .2s ease}
    .edit-label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;font-weight:700}
    .edit-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;-webkit-appearance:none}
    .edit-input:focus{border-color:rgba(255,255,255,.35)}
    .edit-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .edit-btns{display:flex;gap:8px;margin-top:4px}
    .btn-save-edit{flex:1;padding:11px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:9px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none}
    .btn-cancel-edit{flex:1;padding:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;-webkit-appearance:none}
    .edit-ctx-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .edit-ctx-pill{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;-webkit-appearance:none}
    .edit-ctx-pill.active{background:rgba(78,205,164,.2);border-color:var(--accent);color:var(--accent);font-weight:700}

    /* ── MISC ── */
    .empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:15px;line-height:2}
    .empty .emoji{font-size:40px;display:block;margin-bottom:12px}
    #toast{position:fixed;bottom:calc(28px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent2);color:#fff;padding:11px 26px;border-radius:30px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:999;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
    .modal-box{background:#222;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:24px 22px;max-width:300px;width:90%;text-align:center}
    .modal-msg{font-size:16px;color:var(--text);margin-bottom:20px;line-height:1.5}
    .modal-btns{display:flex;gap:10px}
    .modal-cancel{flex:1;padding:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
    .modal-confirm{flex:1;padding:12px;background:var(--red);border:1px solid var(--red-b);border-radius:10px;color:var(--red-t);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes expandIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div class="header"><h1>📓 Gluco Diary</h1></div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('log')">+ Log</button>
  <button class="tab-btn" onclick="switchTab('search')">🔍 Search</button>
  <button class="tab-btn" id="all-tab-btn" onclick="switchTab('all')">All</button>
</div>

<div class="content">
  <!-- LOG TAB -->
  <div id="tab-log" class="tab-panel active">
    <div class="form-card">

      <div class="section-label">🕐 When</div>
      <div class="ts-row">
        <div>
          <div class="field-label">Date</div>
          <div class="ts-field">
            <input class="ts-seg ts-dd" id="ts-dd" maxlength="2" inputmode="numeric" placeholder="DD"
              oninput="tsNumeric(this,2,'ts-mon')" onkeydown="tsKey(event,this,null,'ts-mon')"/>
            <span class="ts-sep">&thinsp;</span>
            <input class="ts-seg ts-mon" id="ts-mon" readonly placeholder="Mon"
              onclick="openPicker('ts-mon',MONTHS,this)" onkeydown="tsKey(event,this,'ts-dd','ts-yyyy')"/>
            <span class="ts-sep">&thinsp;</span>
            <input class="ts-seg ts-yyyy" id="ts-yyyy" maxlength="4" inputmode="numeric" placeholder="YYYY"
              oninput="tsNumeric(this,4,null)" onkeydown="tsKey(event,this,'ts-mon',null)"/>
          </div>
        </div>
        <div>
          <div class="field-label">Time</div>
          <div class="ts-field">
            <input class="ts-seg ts-hh" id="ts-hh" maxlength="2" inputmode="numeric" placeholder="HH"
              oninput="tsNumeric(this,2,'ts-mm')" onkeydown="tsKey(event,this,null,'ts-mm')"/>
            <span class="ts-sep">:</span>
            <input class="ts-seg ts-mm" id="ts-mm" maxlength="2" inputmode="numeric" placeholder="MM"
              oninput="tsNumeric(this,2,'ts-ampm')" onkeydown="tsKey(event,this,'ts-hh','ts-ampm')"/>
            <span class="ts-sep">&thinsp;</span>
            <input class="ts-seg ts-ampm" id="ts-ampm" readonly placeholder="AM"
              onclick="openPicker('ts-ampm',AMPM,this)" onkeydown="tsKey(event,this,'ts-mm',null)"/>
          </div>
        </div>
      </div>

      <hr class="form-divider"/>

      <div class="section-label">🩸 Glucose & Event</div>
      <div class="gluco-event-row">
        <div class="glucose-hero">
          <input type="number" step="0.1" id="f-glucose" placeholder="—" inputmode="decimal"/>
          <div class="glucose-unit">mmol / L</div>
        </div>
        <div class="event-col">
          <div class="field-label">Event</div>
          <div class="ac-wrap">
            <input type="text" id="f-ctx" autocomplete="off" placeholder="type or pick"
              oninput="onCtxInput()" onfocus="onCtxInput()" onblur="hideAcDelayed('ctx-ac')"/>
            <div class="ac-list" id="ctx-ac"></div>
          </div>
        </div>
      </div>
      <div class="ctx-pills">
        <button class="ctx-pill" onclick="toggleCtx('Pre-meal')">Pre-meal</button>
        <button class="ctx-pill" onclick="toggleCtx('Post-meal')">Post-meal</button>
        <button class="ctx-pill" onclick="toggleCtx('Pre-Ex')">Pre-Ex</button>
        <button class="ctx-pill" onclick="toggleCtx('Post-Ex')">Post-Ex</button>
      </div>

      <hr class="form-divider"/>

      <div class="section-label">🍚 Food</div>
      <div class="field-label">Food Name</div>
      <div class="ac-wrap">
        <input type="text" id="f-food" autocomplete="off"
          oninput="onFoodInput()" onfocus="onFoodInput()" onblur="hideAcDelayed('food-ac')"/>
        <div class="ac-list" id="food-ac"></div>
      </div>
      <div id="history-panel"></div>
      <div class="row2">
        <div><div class="field-label">Amount</div><input type="text" id="f-amount"/></div>
        <div><div class="field-label">Insulin (u)</div><input type="text" id="f-insulin"/></div>
      </div>
      <div class="field-label">Tags</div>
      <input type="text" id="f-tags" oninput="updateTagPreview()"/>
      <div class="tag-preview" id="tag-preview"></div>

      <hr class="form-divider"/>
      <div class="field-label">Remarks</div>
      <textarea id="f-remarks" rows="3"></textarea>
      <button class="save-btn" onclick="addEntry()">Save Entry</button>
    </div>
  </div>

  <!-- SEARCH TAB -->
  <div id="tab-search" class="tab-panel">
    <div class="search-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="Search food name or tag…" oninput="renderSearch()"/>
      <span class="search-icon">⌕</span>
    </div>
    <div id="search-hint" class="search-hint" style="display:none"></div>
    <div id="search-results"></div>
  </div>

  <!-- ALL TAB -->
  <div id="tab-all" class="tab-panel">
    <div id="all-results"></div>
  </div>
</div>

<!-- PICKER POPUP -->
<div class="picker-popup" id="picker-popup">
  <div style="position:relative;height:132px;">
    <div class="picker-list" id="picker-list"></div>
    <div class="picker-overlay-lines"></div>
  </div>
</div>

<div id="toast"></div>
<div id="modal-overlay" style="display:none"></div>

<script>
const STORAGE_KEY='gluco-diary-v1';
let entries=[],starMap={},editingId=null,selectedFood=null;
const CTX_OPTIONS=['Pre-meal','Post-meal','Pre-Ex','Post-Ex'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const AMPM=['AM','PM'];

// ── DATA ──
function loadData(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(r){const p=JSON.parse(r);entries=p.entries||[];starMap=p.starMap||{};}
    if(!entries.length){
      const old=localStorage.getItem('insulin-tracker-v1');
      if(old){const p=JSON.parse(old);entries=p.entries||[];starMap=p.starMap||{};saveData();}
    }
  }catch{entries=[];starMap={};}
}
function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({entries,starMap}));}catch{}}

function switchTab(name){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('.tab-btn')[['log','search','all'].indexOf(name)].classList.add('active');
  if(name==='search')renderSearch();
  if(name==='all')renderAll();
}
function parseTags(s){return s?s.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean):[];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updateTagPreview(){
  const tags=parseTags(document.getElementById('f-tags').value);
  document.getElementById('tag-preview').innerHTML=tags.map(t=>`<span class="tag-chip">#${t}</span>`).join('');
}

// ── PICKER ──
let pickerTarget=null,pickerItems=[],pickerScrollTimer=null;

function openPicker(targetId,items,anchorEl){
  pickerTarget=targetId;
  pickerItems=items;
  const popup=document.getElementById('picker-popup');
  const list=document.getElementById('picker-list');
  const currentVal=document.getElementById(targetId).value;
  const currentIdx=Math.max(0,items.indexOf(currentVal));

  // 3 padding items top & bottom so selection is centred
  const pad='<div class="picker-item" style="height:44px"></div>';
  list.innerHTML=pad+pad+pad+
    items.map((v,i)=>`<div class="picker-item${i===currentIdx?' selected':''}" data-val="${v}" onclick="pickItem('${v}')">${v}</div>`).join('')
    +pad+pad+pad;

  // Position popup near anchor
  const rect=anchorEl.getBoundingClientRect();
  const pw=items.length<=2?90:110;
  popup.style.width=pw+'px';
  let top=rect.bottom+6;
  let left=rect.left+rect.width/2-pw/2;
  if(left<8)left=8;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(top+180>window.innerHeight)top=rect.top-186;
  popup.style.top=top+'px';
  popup.style.left=left+'px';
  popup.classList.add('show');

  // Scroll to selected
  list.style.height='132px';
  list.scrollTop=currentIdx*44;

  // Listen for scroll-snap settle
  list.onscroll=()=>{
    clearTimeout(pickerScrollTimer);
    pickerScrollTimer=setTimeout(()=>{
      const idx=Math.round(list.scrollTop/44);
      if(idx>=0&&idx<items.length) highlightPickerItem(idx);
    },80);
  };

  // Close on outside tap
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true,capture:true}),10);
}

function highlightPickerItem(idx){
  document.querySelectorAll('#picker-list .picker-item[data-val]').forEach((el,i)=>{
    el.classList.toggle('selected',i===idx);
  });
}

function pickItem(val){
  if(pickerTarget){
    document.getElementById(pickerTarget).value=val;
    // sync am/pm accent for main form
    if(pickerTarget==='ts-ampm') document.getElementById('ts-ampm').style.color='var(--accent)';
    // advance focus for date flow
    if(pickerTarget==='ts-mon') setTimeout(()=>document.getElementById('ts-yyyy').focus(),50);
  }
  closePicker();
}

function closePicker(e){
  const popup=document.getElementById('picker-popup');
  if(e&&popup.contains(e.target))return;
  popup.classList.remove('show');
  pickerTarget=null;
  document.removeEventListener('click',closePicker,{capture:true});
}

// ── MASKED TIMESTAMP ──
function tsNumeric(el,maxLen,nextId){
  el.value=el.value.replace(/\D/g,'');
  if(el.value.length>=maxLen&&nextId){
    const next=document.getElementById(nextId);
    if(next.readOnly) openPicker(nextId,nextId==='ts-ampm'?AMPM:MONTHS,next);
    else next.focus();
  }
}
function tsKey(event,el,prevId,nextId){
  if(event.key==='Backspace'&&el.value===''&&prevId) document.getElementById(prevId).focus();
  if(event.key==='ArrowRight'&&el.selectionStart===el.value.length&&nextId) document.getElementById(nextId).focus();
  if(event.key==='ArrowLeft'&&el.selectionStart===0&&prevId) document.getElementById(prevId).focus();
}

function initTimestamp(){
  const now=new Date();
  document.getElementById('ts-dd').value=String(now.getDate()).padStart(2,'0');
  document.getElementById('ts-mon').value=MONTHS[now.getMonth()];
  document.getElementById('ts-yyyy').value=String(now.getFullYear());
  const h=now.getHours();
  document.getElementById('ts-hh').value=String(h%12||12).padStart(2,'0');
  document.getElementById('ts-mm').value=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('ts-ampm').value=h>=12?'PM':'AM';
}
function getTimestamp(){
  return{
    date:`${document.getElementById('ts-dd').value.trim()} ${document.getElementById('ts-mon').value.trim()} ${document.getElementById('ts-yyyy').value.trim()}`,
    time:`${document.getElementById('ts-hh').value.trim()}:${document.getElementById('ts-mm').value.trim()} ${document.getElementById('ts-ampm').value.trim()}`
  };
}
function formatDateTime(e){return e.time?`${e.date} · ${e.time}`:e.date;}

// edit-form picker helpers (per entry)
function openEditPicker(targetId,items,anchorEl){
  openPicker(targetId,items,anchorEl);
}

// ── CONTEXT / EVENT ──
let activeCtx=null;
function toggleCtx(val){
  activeCtx=activeCtx===val?null:val;
  document.querySelectorAll('.ctx-pill').forEach(b=>b.classList.toggle('active',b.textContent===activeCtx));
  if(activeCtx){document.getElementById('f-ctx').value=activeCtx;document.getElementById('ctx-ac').style.display='none';}
  else document.getElementById('f-ctx').value='';
}
function resetCtx(){activeCtx=null;document.querySelectorAll('.ctx-pill').forEach(b=>b.classList.remove('active'));}

function getUniqueContexts(){
  const seen=new Set(CTX_OPTIONS);
  entries.forEach(e=>{if(e.context&&!seen.has(e.context))seen.add(e.context);});
  return Array.from(seen);
}
function onCtxInput(){
  const val=document.getElementById('f-ctx').value;
  if(activeCtx&&val!==activeCtx){activeCtx=null;document.querySelectorAll('.ctx-pill').forEach(b=>b.classList.remove('active'));}
  const lower=val.trim().toLowerCase();
  const matches=getUniqueContexts().filter(c=>!lower||c.toLowerCase().includes(lower)).slice(0,6);
  const el=document.getElementById('ctx-ac');
  if(!matches.length||!val.trim()){el.style.display='none';return;}
  el.innerHTML=matches.map(c=>`<div class="ac-item" onmousedown="selectCtx('${esc(c)}')">${esc(c)}</div>`).join('');
  el.style.display='block';
}
function selectCtx(val){
  document.getElementById('f-ctx').value=val;
  document.getElementById('ctx-ac').style.display='none';
  activeCtx=CTX_OPTIONS.includes(val)?val:null;
  document.querySelectorAll('.ctx-pill').forEach(b=>b.classList.toggle('active',b.textContent===activeCtx));
}

// ── FOOD AUTOCOMPLETE ──
function getUniqueFoods(){
  const seen=new Set(),res=[];
  entries.forEach(e=>{if(!e.food)return;const k=e.food.toLowerCase();if(!seen.has(k)){seen.add(k);res.push(e.food);}});
  return res;
}
function onFoodInput(){
  const val=document.getElementById('f-food').value;
  if(selectedFood&&val.toLowerCase()!==selectedFood.toLowerCase()){selectedFood=null;document.getElementById('history-panel').innerHTML='';}
  const lower=val.trim().toLowerCase();
  const matches=getUniqueFoods().filter(n=>!lower||n.toLowerCase().includes(lower)).slice(0,8);
  const el=document.getElementById('food-ac');
  if(!matches.length){el.style.display='none';return;}
  el.innerHTML=matches.map(n=>{
    const cnt=entries.filter(e=>e.food&&e.food.toLowerCase()===n.toLowerCase()).length;
    const hasStar=starMap[n.toLowerCase()]!=null;
    return`<div class="ac-item" onmousedown="selectFood('${esc(n)}')">`+
      `<div class="ac-item-row"><span>${esc(n)}${hasStar?' ⭐':''}</span><span class="ac-sub">${cnt}×</span></div></div>`;
  }).join('');
  el.style.display='block';
}
function hideAcDelayed(id){setTimeout(()=>{const el=document.getElementById(id);if(el)el.style.display='none';},200);}
function selectFood(name){
  document.getElementById('f-food').value=name;
  document.getElementById('food-ac').style.display='none';
  selectedFood=name;showHistoryPanel(name);
}
function showHistoryPanel(name){
  const lower=name.toLowerCase();
  const fe=entries.filter(e=>e.food&&e.food.toLowerCase()===lower);
  if(!fe.length){document.getElementById('history-panel').innerHTML='';return;}
  const starredId=starMap[lower];
  const sorted=[...fe].sort((a,b)=>a.id===starredId?-1:b.id===starredId?1:b.id-a.id);
  document.getElementById('history-panel').innerHTML=`<div class="hist-panel">
    <div class="hist-title">Past — ${esc(name)}</div>
    ${sorted.map(e=>{const isStar=e.id===starredId;return`<div class="hist-row${isStar?' starred':''}">
      <div class="hist-pills">
        ${isStar?'<span style="font-size:11px;color:var(--star);font-weight:700">⭐&nbsp;</span>':''}
        ${e.amount?`<span class="pill pill-amber" style="font-size:11px">📏 ${esc(e.amount)}</span>`:''}
        ${e.insulin?`<span class="pill pill-green" style="font-size:11px">💉 ${esc(e.insulin)}u</span>`:''}
      </div>
      <div class="hist-date">${formatDateTime(e)}${e.remarks?' · '+esc(e.remarks.substring(0,40)):''}</div>
    </div>`;}).join('')}
  </div>`;
}

// ── ADD ENTRY ──
function addEntry(){
  const{date,time}=getTimestamp();
  const glucose=document.getElementById('f-glucose').value.trim();
  const context=document.getElementById('f-ctx').value.trim()||null;
  const food=document.getElementById('f-food').value.trim();
  const amount=document.getElementById('f-amount').value.trim();
  const insulin=document.getElementById('f-insulin').value.trim();
  const tags=parseTags(document.getElementById('f-tags').value);
  const remarks=document.getElementById('f-remarks').value.trim();
  if(!glucose&&!food){showToast('Add glucose or food name');return;}
  if(food&&!amount&&!insulin){showToast('Add amount or insulin for food');return;}
  entries.unshift({id:Date.now(),date,time,glucose:glucose!==''?parseFloat(glucose):null,
    context,food:food||null,amount:amount||null,insulin:insulin||null,tags,remarks:remarks||null});
  saveData();
  ['f-glucose','f-food','f-amount','f-insulin','f-tags','f-remarks'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-ctx').value='';
  document.getElementById('tag-preview').innerHTML='';
  document.getElementById('history-panel').innerHTML='';
  document.getElementById('food-ac').style.display='none';
  document.getElementById('ctx-ac').style.display='none';
  resetCtx();selectedFood=null;initTimestamp();
  updateAllTabCount();showToast('✓ Saved!');switchTab('all');
}

// ── STAR ──
function toggleStar(id,foodKey,event){
  event.stopPropagation();
  if(starMap[foodKey]===id){delete starMap[foodKey];showToast('Star removed');}
  else{starMap[foodKey]=id;showToast('⭐ Marked as optimal');}
  saveData();renderAll();renderSearch();
}

// ── DELETE ──
function deleteEntry(id,event){
  if(event)event.stopPropagation();
  showConfirm('Delete this entry?',()=>{
    const e=entries.find(x=>x.id===id);
    if(e&&e.food&&starMap[e.food.toLowerCase()]===id)delete starMap[e.food.toLowerCase()];
    entries=entries.filter(x=>x.id!==id);
    saveData();updateAllTabCount();renderAll();renderSearch();showToast('Removed');
  });
}

// ── EDIT ──
function startEdit(id,event){if(event)event.stopPropagation();editingId=id;renderAll();renderSearch();}
function cancelEdit(event){if(event)event.stopPropagation();editingId=null;renderAll();renderSearch();}

function toggleEditCtx(entryId,val){
  const input=document.getElementById('edit-ctx-'+entryId);
  const pills=document.querySelectorAll(`.edit-ctx-pill[data-eid="${entryId}"]`);
  const already=input.value===val;
  pills.forEach(p=>p.classList.remove('active'));
  input.value=already?'':val;
  if(!already)pills.forEach(p=>{if(p.textContent===val)p.classList.add('active');});
}
function onEditCtxInput(eid){
  const val=document.getElementById('edit-ctx-'+eid).value;
  const lower=val.trim().toLowerCase();
  const matches=getUniqueContexts().filter(c=>!lower||c.toLowerCase().includes(lower)).slice(0,6);
  const el=document.getElementById('edit-ctx-ac-'+eid);if(!el)return;
  if(!matches.length||!val.trim()){el.style.display='none';return;}
  el.innerHTML=matches.map(c=>`<div class="ac-item" onmousedown="selectEditCtx(${eid},'${esc(c)}')">${esc(c)}</div>`).join('');
  el.style.display='block';
  document.querySelectorAll(`.edit-ctx-pill[data-eid="${eid}"]`).forEach(p=>p.classList.toggle('active',p.textContent===val));
}
function selectEditCtx(eid,val){
  document.getElementById('edit-ctx-'+eid).value=val;
  const el=document.getElementById('edit-ctx-ac-'+eid);if(el)el.style.display='none';
  document.querySelectorAll(`.edit-ctx-pill[data-eid="${eid}"]`).forEach(p=>p.classList.toggle('active',p.textContent===val));
}

function saveEdit(id){
  const dd=document.getElementById(`ets-${id}-dd`).value.trim();
  const mon=document.getElementById(`ets-${id}-mon`).value.trim();
  const yyyy=document.getElementById(`ets-${id}-yyyy`).value.trim();
  const hh=document.getElementById(`ets-${id}-hh`).value.trim();
  const mm=document.getElementById(`ets-${id}-mm`).value.trim();
  const ampm=document.getElementById(`ets-${id}-ampm`).value.trim();
  const date=`${dd} ${mon} ${yyyy}`;
  const time=`${hh}:${mm} ${ampm}`;
  const glucoseVal=document.getElementById('edit-glucose-'+id).value.trim();
  const context=document.getElementById('edit-ctx-'+id).value.trim()||null;
  const food=document.getElementById('edit-food-'+id).value.trim();
  const amount=document.getElementById('edit-amount-'+id).value.trim();
  const insulin=document.getElementById('edit-insulin-'+id).value.trim();
  const tags=parseTags(document.getElementById('edit-tags-'+id).value);
  const remarks=document.getElementById('edit-remarks-'+id).value.trim();
  const old=entries.find(e=>e.id===id);
  if(old&&old.food&&food&&old.food.toLowerCase()!==food.toLowerCase()&&starMap[old.food.toLowerCase()]===id){
    delete starMap[old.food.toLowerCase()];starMap[food.toLowerCase()]=id;
  }
  entries=entries.map(e=>e.id===id?{...e,date,time,glucose:glucoseVal!==''?parseFloat(glucoseVal):null,
    context,food:food||null,amount:amount||null,insulin:insulin||null,tags,remarks:remarks||null}:e);
  saveData();editingId=null;updateAllTabCount();renderAll();renderSearch();showToast('✓ Updated!');
}

// ── RENDER CARD ──
function editTsField(id,date,time){
  const dp=(date||'').split(' ');
  const tp=(time||'').split(/[: ]/);
  const p=`ets-${id}-`;
  return`
  <div class="edit-ts-row">
    <div>
      <label class="edit-label">Date</label>
      <div class="edit-ts-field">
        <input class="edit-ts-seg edit-ts-dd" id="${p}dd" maxlength="2" inputmode="numeric" value="${esc(dp[0]||'')}"
          oninput="tsNumeric(this,2,'${p}mon')" onkeydown="tsKey(event,this,null,'${p}mon')"/>
        <span class="edit-ts-sep">&thinsp;</span>
        <input class="edit-ts-seg edit-ts-mon" id="${p}mon" readonly value="${esc(dp[1]||'')}"
          onclick="openPicker('${p}mon',MONTHS,this)" onkeydown="tsKey(event,this,'${p}dd','${p}yyyy')"/>
        <span class="edit-ts-sep">&thinsp;</span>
        <input class="edit-ts-seg edit-ts-yyyy" id="${p}yyyy" maxlength="4" inputmode="numeric" value="${esc(dp[2]||'')}"
          oninput="tsNumeric(this,4,null)" onkeydown="tsKey(event,this,'${p}mon',null)"/>
      </div>
    </div>
    <div>
      <label class="edit-label">Time</label>
      <div class="edit-ts-field">
        <input class="edit-ts-seg edit-ts-hh" id="${p}hh" maxlength="2" inputmode="numeric" value="${esc(tp[0]||'')}"
          oninput="tsNumeric(this,2,'${p}mm')" onkeydown="tsKey(event,this,null,'${p}mm')"/>
        <span class="edit-ts-sep">:</span>
        <input class="edit-ts-seg edit-ts-mm" id="${p}mm" maxlength="2" inputmode="numeric" value="${esc(tp[1]||'')}"
          oninput="tsNumeric(this,2,'${p}ampm')" onkeydown="tsKey(event,this,'${p}hh','${p}ampm')"/>
        <span class="edit-ts-sep">&thinsp;</span>
        <input class="edit-ts-seg edit-ts-ampm" id="${p}ampm" readonly value="${esc(tp[2]||'')}"
          onclick="openPicker('${p}ampm',AMPM,this)" onkeydown="tsKey(event,this,'${p}mm',null)"/>
      </div>
    </div>
  </div>`;
}

function renderCard(entry,query){
  const isEditing=editingId===entry.id;
  const q=(query||'').toLowerCase();
  const matchedTag=q?(entry.tags||[]).find(t=>t.includes(q)):null;
  const nameMatch=q&&entry.food&&entry.food.toLowerCase().includes(q);
  const isStarred=entry.food&&starMap[entry.food.toLowerCase()]===entry.id;
  const currentCtx=entry.context||'';

  const pillsHTML=[
    isStarred?`<span class="pill-star">⭐ Optimal</span>`:'',
    entry.glucose!=null?`<span class="pill pill-red">🩸 ${entry.glucose} mmol</span>`:'',
    entry.context?`<span class="pill pill-blue">${esc(entry.context)}</span>`:'',
    entry.amount?`<span class="pill pill-amber">📏 ${esc(entry.amount)}</span>`:'',
    entry.insulin?`<span class="pill pill-green">💉 ${esc(entry.insulin)}u</span>`:'',
  ].join('');

  const tagsHTML=(entry.tags||[]).length
    ?`<div class="card-tags">${entry.tags.map(t=>`<span class="card-tag${t===matchedTag?' matched':''}">#${t}</span>`).join('')}</div>`:'';

  const editCtxPills=CTX_OPTIONS.map(o=>
    `<button class="edit-ctx-pill${currentCtx===o?' active':''}" data-eid="${entry.id}" onclick="toggleEditCtx(${entry.id},'${o}')">${o}</button>`
  ).join('');

  const editFormHTML=isEditing?`
    <div class="edit-form">
      ${editTsField(entry.id,entry.date,entry.time)}
      <div class="gluco-event-row" style="margin-bottom:10px">
        <div class="glucose-hero" style="border-color:rgba(255,255,255,.13);min-height:60px">
          <input class="edit-input" type="number" step="0.1" id="edit-glucose-${entry.id}" value="${entry.glucose!=null?entry.glucose:''}" style="font-size:26px;font-weight:700;padding:0;background:none;border:none;margin-bottom:0;width:100%" placeholder="—"/>
          <div class="glucose-unit">mmol / L</div>
        </div>
        <div class="event-col">
          <label class="edit-label">Event</label>
          <div class="ac-wrap">
            <input class="edit-input" type="text" id="edit-ctx-${entry.id}" value="${esc(currentCtx)}"
              oninput="onEditCtxInput(${entry.id})" onblur="hideAcDelayed('edit-ctx-ac-${entry.id}')" style="margin-bottom:0"/>
            <div class="ac-list" id="edit-ctx-ac-${entry.id}"></div>
          </div>
        </div>
      </div>
      <div class="edit-ctx-pills">${editCtxPills}</div>
      <label class="edit-label">Food Name</label>
      <input class="edit-input" type="text" id="edit-food-${entry.id}" value="${esc(entry.food||'')}"/>
      <div class="edit-row2">
        <div><label class="edit-label">Amount</label><input class="edit-input" type="text" id="edit-amount-${entry.id}" value="${esc(entry.amount||'')}"/></div>
        <div><label class="edit-label">Insulin (u)</label><input class="edit-input" type="text" id="edit-insulin-${entry.id}" value="${esc(entry.insulin||'')}"/></div>
      </div>
      <label class="edit-label">Tags</label>
      <input class="edit-input" type="text" id="edit-tags-${entry.id}" value="${esc((entry.tags||[]).join(', '))}"/>
      <label class="edit-label">Remarks</label>
      <textarea class="edit-input" id="edit-remarks-${entry.id}" rows="3" style="resize:none;line-height:1.5">${esc(entry.remarks||'')}</textarea>
      <div class="edit-btns">
        <button class="btn-save-edit" onclick="saveEdit(${entry.id})">Save Changes</button>
        <button class="btn-cancel-edit" onclick="cancelEdit(event)">Cancel</button>
      </div>
    </div>`:'';

  const starBtn=entry.food?`<button class="btn-star${isStarred?' on':''}" onclick="toggleStar(${entry.id},'${esc((entry.food||'').toLowerCase())}',event)">⭐</button>`:'';

  return`<div class="food-card${isStarred?' starred-card':''}${isEditing?' editing':''}">
    <div class="card-top">
      <div class="card-info">
        ${entry.food?`<div class="food-name">${esc(entry.food)}</div>`:''}
        <div class="pills">${pillsHTML}</div>
        ${tagsHTML}
        ${entry.remarks?`<div class="card-remarks">${esc(entry.remarks)}</div>`:''}
        <div class="card-meta">
          <span class="card-time">${formatDateTime(entry)}</span>
          ${(!nameMatch&&matchedTag)?`<span class="match-note">↑ matched tag</span>`:''}
        </div>
      </div>
      <div class="card-actions">
        ${starBtn}
        <button class="btn-edit" onclick="${isEditing?'cancelEdit(event)':'startEdit('+entry.id+',event)'}">${isEditing?'✕':'✏️'}</button>
        <button class="btn-del" onclick="deleteEntry(${entry.id},event)">🗑</button>
      </div>
    </div>
    ${editFormHTML}
  </div>`;
}

// ── RENDER SEARCH ──
function renderSearch(){
  const q=(document.getElementById('search-input')?.value||'').trim();
  const hint=document.getElementById('search-hint');
  const results=document.getElementById('search-results');
  const ql=q.toLowerCase();
  const openGroups=new Set();
  results.querySelectorAll('.group-entries.open').forEach(el=>openGroups.add(el.id));
  const filtered=entries.filter(e=>!q||(e.food&&e.food.toLowerCase().includes(ql))||(e.tags||[]).some(t=>t.includes(ql)));
  if(q){hint.style.display='block';hint.innerHTML=`${filtered.length} result${filtered.length!==1?'s':''} for "${esc(q)}" <span>· searches tags too</span>`;}
  else hint.style.display='none';
  if(!filtered.length){results.innerHTML=`<div class="empty"><span class="emoji">${entries.length?'🔍':'🍚'}</span>${entries.length?'Nothing found':'No entries yet.'}</div>`;return;}
  const groups={};
  filtered.forEach(e=>{const k=e.food?e.food.toLowerCase():'__nofood__';if(!groups[k])groups[k]={name:e.food||'Glucose only',entries:[]};groups[k].entries.push(e);});
  results.innerHTML=Object.values(groups).map(g=>{
    const starredId=g.name!=='Glucose only'?starMap[g.name.toLowerCase()]:null;
    const sorted=[...g.entries].sort((a,b)=>a.id===starredId?-1:b.id===starredId?1:b.id-a.id);
    const hasStar=starredId!=null;
    const gid='grp-'+g.name.toLowerCase().replace(/[^a-z0-9]/g,'_');
    const isOpen=openGroups.has(gid);
    return`<div class="group-card">
      <div class="group-hdr" onclick="toggleGroup('${gid}')">
        <div><div class="group-name">${esc(g.name)}${hasStar?' ⭐':''}</div>
        <div class="group-meta">${g.entries.length} entr${g.entries.length===1?'y':'ies'} · Last: ${formatDateTime(sorted[0])}</div></div>
        <span class="group-chevron${isOpen?' open':''}" id="${gid}-chev">▼</span>
      </div>
      <div class="group-entries${isOpen?' open':''}" id="${gid}">${sorted.map(e=>renderCard(e,q)).join('')}</div>
    </div>`;
  }).join('');
}
function toggleGroup(id){document.getElementById(id).classList.toggle('open');document.getElementById(id+'-chev').classList.toggle('open');}

// ── RENDER ALL ──
function renderAll(){
  const el=document.getElementById('all-results');
  if(!entries.length){el.innerHTML=`<div class="empty"><span class="emoji">📓</span>No entries yet.<br>Log your first entry!</div>`;return;}
  el.innerHTML=`<div class="section-title">All entries · ${entries.length} total</div>`+entries.map(e=>renderCard(e,'')).join('');
}
function updateAllTabCount(){document.getElementById('all-tab-btn').textContent=entries.length?`All (${entries.length})`:'All';}

// ── TOAST ──
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}

// ── CONFIRM ──
function showConfirm(msg,onConfirm){
  const overlay=document.getElementById('modal-overlay');
  overlay.innerHTML=`<div class="modal-overlay" onclick="closeConfirm()"><div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-msg">${msg}</div><div class="modal-btns">
    <button class="modal-cancel" onclick="closeConfirm()">Cancel</button>
    <button class="modal-confirm" onclick="confirmAction()">Delete</button></div></div></div>`;
  overlay.style.display='block';window._confirmCb=onConfirm;
}
function closeConfirm(){document.getElementById('modal-overlay').style.display='none';window._confirmCb=null;}
function confirmAction(){closeConfirm();if(window._confirmCb)window._confirmCb();}

loadData();updateAllTabCount();initTimestamp();
</script>
